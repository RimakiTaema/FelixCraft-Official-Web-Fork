<!DOCTYPE html>
<html lang="th" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Portfolio | FelixCraft</title>
  <link rel="icon" href="https://iili.io/3kG3CMv.png">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --primary: #0061A4;
      --on-primary: #FFFFFF;
      --primary-container: #D1E4FF;
      --surface: #F8F9FF;
      --on-surface: #1E293B;
      --surface-variant: #E2E8F0;
      --on-surface-variant: #64748B;
      --outline: #CBD5E1;
      --glass: rgba(255, 255, 255, 0.7);
      --shadow-color: rgba(148, 163, 184, 0.15);
      --radius-pill: 100px;
      --transition: 0.4s cubic-bezier(0.33, 1, 0.68, 1);
    }

    [data-theme="dark"] {
      --primary: #9ECAFF;
      --on-primary: #003258;
      --primary-container: #00497D;
      --surface: #0F172A;
      --on-surface: #F8FAFC;
      --surface-variant: #1E293B;
      --on-surface-variant: #94A3B8;
      --outline: #334155;
      --glass: rgba(15, 23, 42, 0.7);
      --shadow-color: rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Prompt', sans-serif;
      background-color: var(--surface);
      color: var(--on-surface);
      overflow-x: hidden;
      line-height: 1.7;
      /* Page enter fade */
      animation: pageEnter 0.35s ease-out both;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Exit overlay for page transitions */
    .page-exit {
      position: fixed;
      inset: 0;
      background: var(--surface);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .page-exit.active {
      opacity: 1;
      pointer-events: all;
    }

    .portfolio-container {
      width: 100%;
      min-height: 100vh;
      background: var(--surface);
      overflow: hidden;
    }

    /* Navbar */
    .portfolio-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--outline);
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: var(--surface-variant);
      color: var(--on-surface);
      text-decoration: none;
      border-radius: var(--radius-pill);
      font-weight: 500;
      transition: 0.25s;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
    }

    .back-btn:hover {
      background: var(--primary);
      color: var(--on-primary);
      transform: translateX(-3px);
    }

    /* Content animations */
    .content-block {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .content-block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Markdown Body */
    .markdown-body {
      font-family: 'Prompt', sans-serif;
      color: var(--on-surface-variant);
      line-height: 1.8;
      font-size: 1rem;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      color: var(--on-surface);
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
    }

    .markdown-body h1 {
      font-size: 1.8rem;
      border-bottom: 1px solid var(--outline);
      padding-bottom: 0.3em;
      margin-top: 0;
    }

    .markdown-body h2 {
      font-size: 1.5rem;
      border-bottom: 1px solid var(--outline);
      padding-bottom: 0.3em;
    }

    .markdown-body h3 {
      font-size: 1.2rem;
    }

    .markdown-body p {
      margin-bottom: 1em;
    }

    .markdown-body ul,
    .markdown-body ol {
      margin-bottom: 1em;
      padding-left: 1.5em;
    }

    .markdown-body li {
      margin-bottom: 0.25em;
    }

    .markdown-body a {
      color: var(--primary);
      text-decoration: none;
    }

    .markdown-body a:hover {
      text-decoration: underline;
    }

    .markdown-body code {
      background: rgba(0, 0, 0, 0.1);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.85em;
      color: var(--primary);
    }

    [data-theme="dark"] .markdown-body code {
      background: rgba(255, 255, 255, 0.1);
    }

    .markdown-body pre {
      background: var(--surface-variant);
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid var(--outline);
      margin-bottom: 1em;
    }

    .markdown-body pre code {
      background: none;
      padding: 0;
      color: var(--on-surface);
    }

    .markdown-body blockquote {
      margin: 0 0 1em 0;
      padding-left: 1em;
      border-left: 4px solid var(--primary);
      color: var(--on-surface-variant);
      opacity: 0.8;
    }

    .markdown-body img {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 0.5em;
      display: inline-block;
      vertical-align: middle;
    }

    .markdown-body table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1em;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid var(--outline);
      padding: 8px 12px;
      text-align: left;
    }

    .markdown-body tr:nth-child(even) {
      background: var(--surface-variant);
    }

    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 50vh;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spin-icon {
      width: 40px;
      height: 40px;
      border: 3px solid var(--outline);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @media (max-width: 768px) {
      .portfolio-nav {
        padding: 10px 16px;
      }

      .back-btn {
        padding: 6px 14px;
        font-size: 0.9rem;
      }

      .portfolio-nav span {
        font-size: 0.9rem;
      }

      #banner-block {
        height: 200px !important;
      }

      #profile-block {
        padding: 0 20px 40px !important;
        margin-top: -50px !important;
      }

      #profile-block > div:first-child {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 16px;
      }

      #profile-avatar {
        width: 100px !important;
        height: 100px !important;
      }

      #profile-block h3 {
        font-size: 1.8rem !important;
      }

      #portfolio-content {
        padding: 24px !important;
      }

      .markdown-body {
        font-size: 0.95rem;
      }
    }

    @media (max-width: 480px) {
      #profile-block {
        padding: 0 16px 40px !important;
      }

      #profile-block h3 {
        font-size: 1.5rem !important;
      }

      #profile-block > div:first-child a {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <!-- Page exit overlay for smooth nav transitions -->
  <div class="page-exit" id="page-exit"></div>

  <div class="portfolio-nav">
    <button class="back-btn" id="back-btn"><i class="fas fa-arrow-left"></i> กลับไปหน้าหลัก</button>
    <span style="font-weight: 600; color: var(--primary);">FelixCraft Team</span>
  </div>

  <div class="portfolio-container" id="portfolio-container">
    <div class="loading-spinner">
      <div class="spin-icon"></div>
    </div>
  </div>

  <script>
    // Theme sync
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    // Back button with transition
    document.getElementById('back-btn').addEventListener('click', () => {
      const overlay = document.getElementById('page-exit');
      overlay.classList.add('active');
      setTimeout(() => { window.location.href = 'index.html#team'; }, 300);
    });

    const teamMembers = {
      frame121: {
        name: "Frame121", role: "CEO", discordId: "957864760085446736",
        desc: "ผู้ก่อตั้ง FelixCraft และผู้ดูแลหลักของเซิร์ฟเวอร์ รับผิดชอบด้านการบริหารจัดการ ตัดสินใจทิศทางของโปรเจค และดูแลระบบโครงสร้างพื้นฐานทั้งหมดของเครือข่าย",
        discord: "https://gatecord.com/discord-profile-picture-viewer?id=957864760085446736",
        banner: "https://c.tenor.com/Z6DgGqMrRmkAAAAC/tenor.gif",
        skills: ["Management", "Infrastructure", "Visionary"],
        avatar: "https://cdn.discordapp.com/avatars/957864760085446736/45b2ea12a34ec1581203f74067c1e606.png?size=512",
        readme: "https://raw.githubusercontent.com/Frame121/Frame121/main/README.md"
      },
      nick: {
        name: "Nick", role: "ผู้ร่วมก่อตั้ง", discordId: "1271715061727105038",
        desc: "-",
        discord: "https://gatecord.com/discord-profile-picture-viewer?id=1271715061727105038",
        banner: "https://iili.io/3wsEMXe.png",
        skills: ["Community Management", "Event Planning", "Problem Solving"],
        avatar: "https://cdn.discordapp.com/avatars/1271715061727105038/4b4a96c1e1e3c422460f7c97f770c502.png?size=512",
        readme: null
      },
      hunt: {
        name: "Hunt", role: "Admin", discordId: "787239141443895317",
        desc: "ควย",
        discord: "https://gatecord.com/discord-profile-picture-viewer?id=787239141443895317",
        banner: "https://iili.io/3erxcLG.webp",
        skills: ["Player Support", "Moderation", "Teamwork"],
        avatar: "https://cdn.discordapp.com/avatars/787239141443895317/399c8e9309edddc45a72136fd61fc410.png?size=512",
        readme: null
      },
      rimaki: {
        name: "Rimaki", role: "Admin & Developer", discordId: "1228588732563587114",
        desc: "ผู้ดูแลระบบและนักพัฒนาแนวหน้า มีความเชี่ยวชาญในการดูแลระบบต่างๆ ปรับแต่งประสิทธิภาพ และแก้ไขบัคในโค้ดให้ระบบทำงานได้อย่างสมบูรณ์สำหรับ Minecraft",
        discord: "https://gatecord.com/discord-profile-picture-viewer?id=1228588732563587114",
        banner: "https://iili.io/3erIJHB.png",
        skills: ["Plugin Dev", "Backend", "Optimization"],
        avatar: "https://cdn.discordapp.com/avatars/1228588732563587114/0ce88a5ede9dbac60f9487a0f95f02af.png?size=512",
        readme: "https://raw.githubusercontent.com/RimakiTaema/RimakiTaema/main/README.md"
      },
      nicekun: {
        name: "Nicekun", role: "Admin & Developer", discordId: "1354504716133859408",
        desc: "นักพัฒนาและผู้ดูแลระบบหลักที่เชี่ยวชาญด้านการเขียน Plugin สร้างระบบใหม่ๆ ที่ไม่เหมือนใคร และยกระดับประสบการณ์ผู้เล่นในเซิร์ฟเวอร์ Minecraft",
        discord: "https://gatecord.com/discord-profile-picture-viewer?id=1354504716133859408",
        banner: [
          "https://files.catbox.moe/m7g15u.png",
          "https://files.catbox.moe/hez5qz.png",
          "https://files.catbox.moe/2qcnll.png"
        ],
        skills: ["Java Development", "Game Design", "Creativity"],
        avatar: "https://cdn.discordapp.com/avatars/1354504716133859408/8d8243fd90ff3f1211af5ba5b940080b?size=1024",
        readme: "https://raw.githubusercontent.com/NotNiceKun/CcNicebruh/main/README.md"
      }
    };

    async function loadPortfolio() {
      const urlParams = new URLSearchParams(window.location.search);
      const userId = urlParams.get('user');
      const container = document.getElementById('portfolio-container');

      if (!userId || !teamMembers[userId]) {
        container.innerHTML = `
          <div style="padding: 80px; text-align: center;">
            <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: #ef4444; margin-bottom: 24px;"></i>
            <h2 style="margin-bottom: 16px;">ไม่พบข้อมูลผู้ใช้งาน</h2>
            <p style="color: var(--on-surface-variant); margin-bottom: 24px;">ขออภัย ไม่พบประวัติโปรไฟล์ที่คุณกำลังค้นหา</p>
            <button class="back-btn" onclick="window.location.href='index.html#team'">กลับสู่หน้าหลัก</button>
          </div>
        `;
        return;
      }

      const m = teamMembers[userId];
      document.title = `${m.name} | FelixCraft Team`;

      const initialBanner = Array.isArray(m.banner) ? m.banner[0] : m.banner;

      // Render shell with animation classes
      container.innerHTML = `
        <div class="content-block" id="banner-block" style="width: 100%; height: 280px; background: url('${initialBanner}') center/cover no-repeat; position: relative;"></div>
        <div class="content-block" id="profile-block" style="max-width: 900px; margin: 0 auto; padding: 0 32px 60px; position: relative; margin-top: -70px;">
          <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
            <img id="profile-avatar" src="${m.avatar}" alt="${m.name}" style="width: 130px; height: 130px; border-radius: 50%; border: 5px solid var(--surface); background: var(--surface); box-shadow: 0 8px 24px rgba(0,0,0,0.35);">
            <a href="${m.discord}" target="_blank" rel="noopener noreferrer" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #5865F2; color: white; text-decoration: none; border-radius: 50px; transition: 0.25s; font-weight: 600; box-shadow: 0 4px 12px rgba(88,101,242,0.4);">
              <i class="fab fa-discord"></i> Discord
            </a>
          </div>
          <h3 style="font-size: 2.2rem; font-weight: 700; color: var(--on-surface); margin-bottom: 4px; letter-spacing: -0.5px;">${m.name}</h3>
          <p style="color: var(--primary); font-weight: 600; font-size: 1rem; margin-bottom: 28px; text-transform: uppercase; letter-spacing: 2px;">${m.role}</p>
          <div id="portfolio-content" style="background: var(--surface-variant); padding: 32px; border-radius: 20px; border: 1px solid var(--outline); min-height: 180px; display: flex; align-items: center; justify-content: center;">
            <div class="spin-icon"></div>
          </div>
        </div>
      `;

      // Discord Asset Auto-update (Avatar & Banner)
      if (m.discordId) {
        try {
          const resp = await fetch(`https://api.lanyard.rest/v1/users/${m.discordId}`);
          const data = await resp.json();
          if (data.success) {
            const user = data.data.discord_user;
            // Update Avatar
            if (user.avatar) {
              const avatarUrl = `https://cdn.discordapp.com/avatars/${m.discordId}/${user.avatar}.png?size=512`;
              const avatarImg = document.getElementById('profile-avatar');
              if (avatarImg) avatarImg.src = avatarUrl;
            }
            // Update Banner (only if they have one and it's not a gif from hardcoded m.banner)
            if (user.banner) {
              const bannerUrl = `https://cdn.discordapp.com/banners/${m.discordId}/${user.banner}.png?size=1024`;
              const bannerBlock = document.getElementById('banner-block');
              if (bannerBlock) {
                // If it's a list (like Nicekun), we stop the rotation or just set first as sync
                bannerBlock.style.backgroundImage = `url('${bannerUrl}')`;
              }
            }
          }
        } catch (e) { console.error("Discord asset sync failed", e); }
      }

      // Trigger animations with slight delays
      requestAnimationFrame(() => {
        setTimeout(() => document.getElementById('banner-block')?.classList.add('visible'), 50);
        setTimeout(() => document.getElementById('profile-block')?.classList.add('visible'), 150);
      });

      // Setup Banner Rotation for multi-banner (Nicekun etc.)
      if (Array.isArray(m.banner) && m.banner.length > 1) {
        let bannerIndex = 0;
        setInterval(() => {
          bannerIndex = (bannerIndex + 1) % m.banner.length;
          const bannerDiv = document.getElementById('banner-block');
          if (bannerDiv) {
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:absolute;inset:0;background:url('${m.banner[bannerIndex]}') center/cover no-repeat;opacity:0;transition:opacity 1.2s ease;`;
            bannerDiv.appendChild(overlay);
            void overlay.offsetWidth;
            overlay.style.opacity = '1';
            setTimeout(() => { bannerDiv.style.backgroundImage = `url('${m.banner[bannerIndex]}')`; overlay.remove(); }, 1200);
          }
        }, 30000);
      }

      // Fetch README
      try {
        let htmlContent = '';
        let fetched = false;

        // 1. Try direct GitHub URL first
        if (m.readme) {
          const resp = await fetch(m.readme);
          if (resp.ok) {
            const md = await resp.text();
            htmlContent = marked.parse(md);
            fetched = true;
          }
        }

        // 2. Fallback: show desc + skills
        if (!fetched) {
          htmlContent = `
            <h4 style="font-size: 1.4rem; margin-top: 0; color: var(--on-surface); font-weight: 600; margin-bottom: 16px; border-bottom: 2px solid var(--outline); padding-bottom: 8px;">About Me</h4>
            <p style="margin-bottom: 32px; font-size: 1.05rem;">${m.desc}</p>
            <h4 style="font-size: 1.4rem; color: var(--on-surface); font-weight: 600; margin-bottom: 16px; border-bottom: 2px solid var(--outline); padding-bottom: 8px;">Core Focus</h4>
            <div style="display: flex; flex-wrap: wrap; gap: 12px;">
              ${m.skills.map(skill => `<span style="background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 500;">${skill}</span>`).join('')}
            </div>
          `;
        }

        const contentDiv = document.getElementById('portfolio-content');
        if (contentDiv) {
          contentDiv.style.display = 'block';
          contentDiv.innerHTML = `<div class="markdown-body">${htmlContent}</div>`;
        }
      } catch {
        const c = document.getElementById('portfolio-content');
        if (c) c.innerHTML = `<div class="markdown-body"><p>ไม่สามารถโหลดข้อมูลได้ในขณะนี้</p></div>`;
      }
    }

    window.addEventListener('DOMContentLoaded', loadPortfolio);
  </script>
</body>

</html>
